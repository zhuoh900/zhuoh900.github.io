<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buttons Page 1</title>

<style>


body{
  margin:0;
  background:white;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

.nav-btn{
  position:fixed;
  top:25px;
  left:30px;
  text-decoration:none;
  color:black;
  font-size:18px;
  font-weight:500;
  letter-spacing:-0.2px;
  opacity:0.7;
  transition:all .25s ease;
}

.nav-btn:hover{
  opacity:1;
  transform:translateX(4px);
}


.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
  padding:100px 40px 40px;
}

.video-card{
  overflow:hidden;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
  cursor:pointer;
}

video{
  width:100%;
  display:block;
}

</style>
</head>

<body>


<a href="index.html" class="nav-btn">← Back</a>

<div class="gallery">

  <div class="video-card">
    <video muted loop preload="metadata">
      <source src="btn1.mp4" type="video/mp4">
    </video>
  </div>

  <div class="video-card">
    <video muted loop preload="metadata">
      <source src="btn2.mp4" type="video/mp4">
    </video>
  </div>

</div>

<script>
document.querySelectorAll("video").forEach(video=>{
  const card = video.parentElement;

  card.addEventListener("mouseenter",()=>{
    video.play();
  });

  card.addEventListener("mouseleave",()=>{
    video.pause();
    video.currentTime=0;
  });
});
</script>

</body>
</html>
