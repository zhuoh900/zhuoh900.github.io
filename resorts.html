<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ski App</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<section class="hero">

  <!-- 背景 -->
  <img src="images/resort.png" class="bg" />

  <!-- 顶部按钮 -->
 <div class="top-buttons">

    <a href="index.html" class="circle-btn">
      <img src="icons/home.svg" class="icon">
    </a>
  </div>

  <!-- 卡片区域 -->
  <div class="card-container">

    <div class="card">
      <img src="images/1.jpg">
      <div class="card-info">
        <span>Baqueira Beret</span>
        <span>170 Km</span>
      </div>
    </div>

    <div class="card">
      <img src="images/2.jpg">
      <div class="card-info">
        <span>Boí Taüll</span>
        <span>46 Km</span>
      </div>
    </div>

    <div class="card">
      <img src="images/3.jpg">
      <div class="card-info">
        <span>Valter</span>
        <span>12 Km</span>
      </div>
    </div>

    <div class="card">
      <img src="images/4.jpg">
      <div class="card-info">
        <span>Espot Esquí</span>
        <span>25 Km</span>
      </div>
    </div>

    <div class="card">
      <img src="images/5.png">
      <div class="card-info">
        <span>Grandvalira</span>
        <span>210 Km</span>
      </div>
    </div>

    <div class="card">
      <img src="images/6.jpg">
      <div class="card-info">
        <span>La Molina</span>
        <span>71 Km</span>
      </div>
    </div>

  </div>

</section>

</body>
</html>
