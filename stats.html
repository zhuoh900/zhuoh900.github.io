<section style="position:relative; height:100vh; overflow:hidden;">

  <!-- 背景 -->
  <img src="images/stats.png"
       alt="background"
       style="
       position:absolute;
       top:0;
       left:0;
       width:100%;
       height:100%;
       object-fit:cover;
       z-index:0;
       ">

  <!-- 暗层，让按钮和卡片更明显 -->
  <div style="
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.22);
    z-index:1;
  "></div>

  <!-- Home 按钮 -->
  <div style="
    position:absolute;
    top:24px;
    left:24px;
    z-index:999;
  ">
    <a href="index.html"
   onmouseover="this.style.transform='scale(1.08)'; this.style.background='rgba(255,255,255,1)'"
   onmouseout="this.style.transform='scale(1)'; this.style.background='rgba(255,255,255,0.9)'"
   style="
   width:74px;
   height:74px;
   border-radius:50%;
   display:flex;
   align-items:center;
   justify-content:center;
   background:rgba(255,255,255,0.9);
   backdrop-filter:blur(10px);
   -webkit-backdrop-filter:blur(10px);
   box-shadow:0 8px 20px rgba(0,0,0,0.28);
   text-decoration:none;
   transition:all 0.25s ease;
   ">
  <img src="icons/home.svg" alt="home" style="width:30px;">
</a>
  </div>

  <!-- 卡片区域 -->
  <div style="
    position:absolute;
    top:110px;
    left:50%;
    transform:translateX(-50%);
    width:min(760px, 72%);
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:14px;
    z-index:10;
  ">

    <img src="images/q.png" alt="" style="width:100%; border-radius:12px; grid-column:span 2; box-shadow:0 15px 40px rgba(0,0,0,0.35); display:block;">
    <img src="images/w.png" alt="" style="width:100%; border-radius:12px; box-shadow:0 15px 40px rgba(0,0,0,0.35); display:block;">
    <img src="images/e.png" alt="" style="width:100%; border-radius:12px; box-shadow:0 15px 40px rgba(0,0,0,0.35); display:block;">
    <img src="images/r.png" alt="" style="width:100%; border-radius:12px; grid-column:span 2; box-shadow:0 15px 40px rgba(0,0,0,0.35); display:block;">
    <img src="images/t.png" alt="" style="width:100%; border-radius:12px; box-shadow:0 15px 40px rgba(0,0,0,0.35); display:block;">
    <img src="images/y.png" alt="" style="width:100%; border-radius:12px; box-shadow:0 15px 40px rgba(0,0,0,0.35); display:block;">

  </div>

</section>
