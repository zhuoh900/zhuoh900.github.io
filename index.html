<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Borges Sphere</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

#topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 50px;
    background: rgba(0,0,0,0.4);
    color: white;
    display: flex;
    align-items: center;
    padding-left: 20px;
    z-index: 10;
}

#menuBtn {
    font-size: 28px;
    cursor: pointer;
}

#menu {
    position: fixed;
    top: 50px;
    left: 20px;
    background: rgba(0,0,0,0.85);
    padding: 15px;
    display: none;
}

#menu a {
    display: block;
    color: white;
    text-decoration: none;
    margin: 8px 0;
}
</style>
</head>

<body>

<div id="topbar">
    <div id="menuBtn">☰</div>
</div>

<div id="menu">
    <a href="index.html">Home</a>
    <a href="garden.html">The Garden of Forking Paths</a>
    <a href="ruins.html">The Circular Ruins</a>
    <a href="sand.html">The Book of Sand</a>
    <a href="info.html">Info</a>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>

const menuBtn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");
menuBtn.addEventListener("click", () => {
    menu.style.display = menu.style.display === "block" ? "none" : "block";
});


const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 16;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);


const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(6, 16, 16),
    new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true,
        transparent: true,
        opacity: 0.06
    })
);
scene.add(sphere);

const textData = [
    { title: "He wantedto dream a man", link: "ruins.html#quote_1" },
    { title: "What remains is unreal and unimportant", link: "garden.html#quote_4" },
    { title: "through meadows misty in the twilight", link: "garden.html#quote_3" },
    { title: "Lost in these imaginary illusions I forgot my destiny", link: "garden.html#quote_2" }
];

function createTextSprite(message) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 1024;
    canvas.height = 512;
    ctx.fillStyle = "white";
    ctx.font = "64px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    const words = message.split(" ");
    let line = "";
    const lines = [];
    for (let i = 0; i < words.length; i++) {
        const testLine = line + words[i] + " ";
        const metrics = ctx.measureText(testLine);
        if (metrics.width > canvas.width - 50) {
            lines.push(line);
            line = words[i] + " ";
        } else {
            line = testLine;
        }
    }
    lines.push(line);

    const lineHeight = 64;
    const startY = canvas.height / 2 - (lines.length / 2) * lineHeight;
    lines.forEach((l, index) => {
        ctx.fillText(l.trim(), canvas.width / 2, startY + index * lineHeight);
    });

    const texture = new THREE.CanvasTexture(canvas);
    const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(material);

  
    sprite.scale.set(4.8, lines.length * 1.5, 1);
    return sprite;
}

function distribute(object, i, total, radius) {
    const phi = Math.acos(-1 + (2 * i) / total);
    const theta = Math.sqrt(total * Math.PI) * phi;
    object.position.set(
        radius * Math.cos(theta) * Math.sin(phi),
        radius * Math.sin(theta) * Math.sin(phi),
        radius * Math.cos(phi)
    );
}

const sprites = [];
textData.forEach((item, i) => {
    const sprite = createTextSprite(item.title);
    distribute(sprite, i, textData.length, 6);
    sprite.userData = item;
    sphere.add(sprite);
    sprites.push(sprite);
});


const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click", (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(sprites);

    if (intersects.length > 0) {
        const targetLink = intersects[0].object.userData.link;
        if (targetLink) {
            window.location.href = targetLink;
        }
    }
});


function animate() {
    requestAnimationFrame(animate);
    sphere.rotation.y += 0.0008;
    sphere.rotation.x += 0.0002;
    sprites.forEach(sprite => {
        sprite.quaternion.copy(camera.quaternion); 
    });
    renderer.render(scene, camera);
}
animate();


window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
